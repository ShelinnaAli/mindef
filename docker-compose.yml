version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: exergame-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-exergame}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-exergame}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - exergame-network

  # Backend - Laravel (PHP-FPM)
  backend:
    build:
      context: ./exergame-backend
      dockerfile: Dockerfile
    container_name: exergame-backend
    restart: unless-stopped
    volumes:
      - ./exergame-backend:/var/www/html
      - backend-cache:/var/www/html/bootstrap/cache
      - backend-storage:/var/www/html/storage
    networks:
      - exergame-network
    depends_on:
      - db

  # Nginx for Backend
  nginx:
    image: nginx:alpine
    container_name: exergame-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./exergame-backend:/var/www/html
      - ./exergame-backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - exergame-network
    depends_on:
      - backend

  # Frontend - Nuxt.js
  frontend:
    build:
      context: ./exergame-frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NUXT_API_INTERNAL_BASE_URL: http://nginx
        NUXT_ENCRYPTION_KEY: base64:BeSp9Y2vrBotBwa/+3JPU4pfz6Jh1bJTBBeJ0d+MAP8=
    container_name: exergame-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./exergame-frontend:/app
      - /app/node_modules
      - /app/.output
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - NUXT_API_INTERNAL_BASE_URL=http://nginx
      - NUXT_ENCRYPTION_KEY=base64:BeSp9Y2vrBotBwa/+3JPU4pfz6Jh1bJTBBeJ0d+MAP8=
    networks:
      - exergame-network

networks:
  exergame-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  backend-cache:
    driver: local
  backend-storage:
    driver: local
